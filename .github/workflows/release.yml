name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  RUST_VERSION: 1.93.0

jobs:
  bundle:
    name: Bundle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            bundles: appimage,deb
          - name: macOS
            os: macos-14
            bundles: dmg
          - name: Windows
            os: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm tauri build --bundles ${{ matrix.bundles }}
      - run: cargo +${{ env.RUST_VERSION }} build --release --manifest-path src-tauri/Cargo.toml --bin polkameter
      - uses: actions/upload-artifact@v4
        with:
          name: polkameter-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/polkameter
            src-tauri/target/release/polkameter.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-artifacts/polkameter.spdx.json
      - name: Attest release bundles
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-artifacts/**/*
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            release-artifacts/**/*
