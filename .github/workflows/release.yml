name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  RUST_VERSION: 1.93.0
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  bundle:
    name: Bundle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            bundles: appimage,deb
          - name: macOS
            os: macos-14
            bundles: dmg
          - name: Windows
            os: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm tauri build --bundles ${{ matrix.bundles }}
      - run: cargo +${{ env.RUST_VERSION }} build --release --manifest-path src-tauri/Cargo.toml --bin polkameter
      - uses: actions/upload-artifact@v4
        with:
          name: polkameter-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/polkameter
            src-tauri/target/release/polkameter.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - name: Package platform release archives
        shell: bash
        run: |
          mkdir -p release-assets
          for artifact in release-artifacts/polkameter-*; do
            test -d "$artifact"
            case "$(basename "$artifact")" in
              polkameter-Linux) target=linux-x86_64 ;;
              polkameter-macOS) target=macos-aarch64 ;;
              polkameter-Windows) target=windows-x86_64 ;;
              *) echo "Unexpected release artifact: $artifact" >&2; exit 1 ;;
            esac
            tar -C "$artifact" -czf "release-assets/polkameter-${target}.tar.gz" .
          done
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/polkameter.spdx.json
      - name: Attest release bundles
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-assets/**/*
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0)
          test "${#assets[@]}" -gt 0
          gh release create "${{ env.RELEASE_TAG }}" \
            --verify-tag \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            "${assets[@]}"
