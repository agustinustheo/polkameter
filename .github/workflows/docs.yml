name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "book.toml"
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "book.toml"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: 0.4.52

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Restore mdBook cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook
          key: mdbook-${{ runner.os }}-${{ env.MDBOOK_VERSION }}
      - name: Install mdBook
        run: |
          if ! mdbook --version | grep -Fx "mdbook v${MDBOOK_VERSION}"; then
            cargo install mdbook --version "${MDBOOK_VERSION}" --locked --force
          fi
      - name: Build book
        run: mdbook build
      - name: Upload rendered book
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
